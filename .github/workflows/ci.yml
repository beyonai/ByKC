name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --all-extras

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

  module-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: knowledge
            install: uv sync --extra dev --extra knowledge
            test_command: bash scripts/knowledge_base/run_unit_tests.sh
          - name: knowledge-build
            install: uv sync --extra dev --extra knowledge-build
            test_command: bash scripts/knowledge_build/run_unit_tests.sh
          - name: qa
            install: uv sync --extra dev --extra qa
            test_command: bash scripts/qa/run_unit_tests.sh
          - name: packaging
            install: uv sync --extra dev
            test_command: uv run python -m pytest tests/packaging -q

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Run module tests
        run: ${{ matrix.test_command }}

  build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - module-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build distribution artifacts
        run: uv build
