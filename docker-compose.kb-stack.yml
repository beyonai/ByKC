services:
  opengauss:
    image: ${OPENGAUSS_CUSTOM_IMAGE:-by_qa/opengauss-server-kb}:${OPENGAUSS_IMAGE_TAG:-7.0.0-RC1}
    build:
      context: .
      dockerfile: docker/opengauss/custom/Dockerfile
      args:
        OPENGAUSS_BASE_IMAGE: opengauss/opengauss-server:${OPENGAUSS_IMAGE_TAG:-7.0.0-RC1}
        OPENGAUSS_SOURCE_REF: ${OPENGAUSS_SOURCE_REF:-7.0.0-RC1}
    container_name: by-qa-opengauss
    restart: unless-stopped
    privileged: true
    environment:
      GS_PASSWORD: "${OPENGAUSS_SUPERUSER_PASSWORD:-OpenGauss#2026}"
      GS_USERNAME: "${OPENGAUSS_APP_USER:-gaussdb}"
      GS_USER_PASSWORD: "${OPENGAUSS_APP_PASSWORD:-OpenGauss#2026}"
      GS_DB: "${OPENGAUSS_DB:-postgres}"
    ports:
      - "${OPENGAUSS_PORT:-15432}:5432"
    volumes:
      - ./data/opengauss:/var/lib/opengauss
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "source /home/omm/.bashrc >/dev/null 2>&1 || true; source /etc/profile >/dev/null 2>&1 || true; gsql -h 127.0.0.1 -p 5432 -d $$GS_DB -U $$GS_USERNAME -W $$GS_USER_PASSWORD -At -c 'SELECT 1;' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  opengauss-init:
    image: ${OPENGAUSS_CUSTOM_IMAGE:-by_qa/opengauss-server-kb}:${OPENGAUSS_IMAGE_TAG:-7.0.0-RC1}
    profiles: ["init"]
    depends_on:
      opengauss:
        condition: service_healthy
    environment:
      OPENGAUSS_HOST: opengauss
      OPENGAUSS_PORT: 5432
      OPENGAUSS_DB: "${OPENGAUSS_DB:-postgres}"
      OPENGAUSS_APP_USER: "${OPENGAUSS_APP_USER:-gaussdb}"
      OPENGAUSS_APP_PASSWORD: "${OPENGAUSS_APP_PASSWORD:-OpenGauss#2026}"
      OPENGAUSS_GRAPH_NAME: "${OPENGAUSS_GRAPH_NAME:-knowledge_graph}"
    volumes:
      - ./docker/opengauss/init:/init:ro
    entrypoint: ["/bin/bash", "/init/init-opengauss.sh"]
    restart: "no"

  minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-latest}
    container_name: by-qa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      NO_PROXY: "minio"
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:${MINIO_MC_IMAGE_TAG:-latest}
    profiles: ["init"]
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_DEFAULT_BUCKET: "${MINIO_DEFAULT_BUCKET:-knowledge-base}"
      NO_PROXY: "minio"
    volumes:
      - ./docker/minio/init:/init:ro
    entrypoint: ["/bin/sh", "/init/init-minio.sh"]
    restart: "no"
